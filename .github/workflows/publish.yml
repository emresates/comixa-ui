name: Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install latest npm (OIDC / Trusted Publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish if version is new
        run: |
          set -e
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"

          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping publish: ${NAME}@${VERSION} is already on npm."
            exit 0
          fi

          echo "Publishing ${NAME}@${VERSION} via Trusted Publishing (OIDC)..."
          npm publish --access public
